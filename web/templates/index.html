<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenGodOS - 数字生命控制台</title>
    
    <!-- 样式 -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 头部样式 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .logo-icon {
            font-size: 2.5rem;
            color: #00d4ff;
        }
        
        .logo-text h1 {
            font-size: 2rem;
            background: linear-gradient(90deg, #00d4ff, #0088ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }
        
        .logo-text p {
            color: #a0a0c0;
            font-size: 0.9rem;
        }
        
        .system-status {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff4444;
            animation: pulse 2s infinite;
        }
        
        .status-indicator.running {
            background: #44ff44;
            animation: pulse-running 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        @keyframes pulse-running {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        /* 控制面板 */
        .control-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .control-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .control-card:hover {
            transform: translateY(-5px);
            border-color: #00d4ff;
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.2);
        }
        
        .control-card h3 {
            color: #00d4ff;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }
        
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: linear-gradient(90deg, #00d4ff, #0088ff);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            text-decoration: none;
            text-align: center;
        }
        
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }
        
        .btn.stop {
            background: linear-gradient(90deg, #ff4444, #ff0000);
        }
        
        .btn.reset {
            background: linear-gradient(90deg, #ffaa00, #ff5500);
        }
        
        /* 主内容区域 */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }
        
        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
        
        .panel {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            backdrop-filter: blur(10px);
        }
        
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .panel-header h2 {
            color: #00d4ff;
            font-size: 1.3rem;
        }
        
        .panel-header .badge {
            background: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 0.8rem;
        }
        
        /* 神经元网格 */
        .neurons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 10px;
        }
        
        .neuron-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .neuron-card:hover {
            border-color: #00d4ff;
            transform: translateY(-3px);
        }
        
        .neuron-card.active {
            border-color: #44ff44;
            background: rgba(68, 255, 68, 0.1);
        }
        
        .neuron-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .neuron-type {
            font-size: 0.8rem;
            color: #a0a0c0;
            background: rgba(160, 160, 192, 0.1);
            padding: 2px 8px;
            border-radius: 10px;
        }
        
        .neuron-id {
            font-weight: bold;
            color: #fff;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }
        
        .neuron-activation {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin: 10px 0;
            overflow: hidden;
        }
        
        .activation-bar {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #0088ff);
            border-radius: 3px;
            width: 0%;
            transition: width 0.5s ease;
        }
        
        .neuron-stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #a0a0c0;
        }
        
        /* 信号列表 */
        .signals-list {
            max-height: 400px;
            overflow-y: auto;
            padding-right: 10px;
        }
        
        .signal-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }
        
        .signal-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(0, 212, 255, 0.3);
        }
        
        .signal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .signal-id {
            font-size: 0.8rem;
            color: #a0a0c0;
        }
        
        .signal-type {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            background: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
        }
        
        .signal-type.inhibitory {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
        }
        
        .signal-path {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 0.9rem;
        }
        
        .signal-arrow {
            color: #00d4ff;
            margin: 0 10px;
        }
        
        .signal-strength {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin: 8px 0;
            overflow: hidden;
        }
        
        .strength-bar {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #0088ff);
            border-radius: 2px;
        }
        
        /* 指标面板 */
        .metrics-panel {
            grid-column: 1 / -1;
            margin-top: 20px;
        }
        
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        
        .metric-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }
        
        .metric-value {
            font-size: 2rem;
            font-weight: bold;
            color: #00d4ff;
            margin: 10px 0;
        }
        
        .metric-label {
            color: #a0a0c0;
            font-size: 0.9rem;
        }
        
        /* 底部 */
        .footer {
            text-align: center;
            padding: 20px;
            color: #a0a0c0;
            font-size: 0.9rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 30px;
        }
        
        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 212, 255, 0.3);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 212, 255, 0.5);
        }
        
        /* 加载动画 */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 212, 255, 0.3);
            border-top: 3px solid #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 响应式调整 */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }
            
            .control-panel {
                grid-template-columns: 1fr;
            }
            
            .neurons-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
        }
    </style>
    
    <!-- Socket.IO -->
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">🧠</div>
                <div class="logo-text">
                    <h1>OpenGodOS</h1>
                    <p>数字生命操作系统控制台</p>
                </div>
            </div>
            
            <div class="system-status">
                <div class="status-indicator" id="statusIndicator"></div>
                <span id="statusText">系统停止</span>
            </div>
        </header>
        
        <!-- 控制面板 -->
        <div class="control-panel">
            <div class="control-card">
                <h3>系统控制</h3>
                <button class="btn" id="startBtn" onclick="startSystem()">启动系统</button>
                <button class="btn stop" id="stopBtn" onclick="stopSystem()" disabled>停止系统</button>
                <button class="btn reset" id="resetBtn" onclick="resetSystem()">重置系统</button>
            </div>
            
            <div class="control-card">
                <h3>拓扑管理</h3>
                <button class="btn" onclick="loadTopology()">加载拓扑</button>
                <button class="btn" onclick="saveTopology()">保存拓扑</button>
                <button class="btn" onclick="newTopology()">新建拓扑</button>
            </div>
            
            <div class="control-card">
                <h3>信号控制</h3>
                <button class="btn" onclick="sendTestSignal()">发送测试信号</button>
                <button class="btn" onclick="clearSignals()">清空信号</button>
            </div>
            
            <div class="control-card">
                <h3>监控设置</h3>
                <button class="btn" onclick="toggleAutoRefresh()">自动刷新: <span id="autoRefreshStatus">开启</span></button>
                <button class="btn" onclick="exportData()">导出数据</button>
            </div>
        </div>
        
        <!-- 主内容区域 -->
        <div class="main-content">
            <!-- 神经元面板 -->
            <div class="panel">
                <div class="panel-header">
                    <h2>神经元状态</h2>
                    <div class="badge" id="neuronCount">0 个神经元</div>
                </div>
                <div class="neurons-grid" id="neuronsGrid">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
            
            <!-- 信号面板 -->
            <div class="panel">
                <div class="panel-header">
                    <h2>实时信号</h2>
                    <div class="badge" id="signalCount">0 个信号</div>
                </div>
                <div class="signals-list" id="signalsList">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 指标面板 -->
        <div class="panel metrics-panel">
            <div class="panel-header">
                <h2>系统指标</h2>
                <div class="badge">实时监控</div>
            </div>
            <div class="metrics-grid" id="metricsGrid">
                <div class="metric-card">
                    <div class="metric-label">神经元总数</div>
                    <div class="metric-value" id="metricTotalNeurons">0</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">活跃神经元</div>
                    <div class="metric-value" id="metricActiveNeurons">0</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">平均激活度</div>
                    <div class="metric-value" id="metricAvgActivation">0.00</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">运行时间</div>
                    <div class="metric-value" id="metricUptime">0s</div>
                </div>
